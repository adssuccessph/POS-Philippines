<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>POS Philippines — Admin</title><link rel="stylesheet" href="./styles.css"></head><body>
<div id="app"></div><div id="toast" class="toast"></div>
<dialog id="entityDialog" class="modal"><div class="modal-head"><h3 id="entityDialogTitle">Edit</h3><button class="modal-close" data-close="entityDialog">×</button></div><div id="entityDialogBody" class="modal-body"></div></dialog>
<dialog id="inquiryDialog" class="modal"><div class="modal-head"><h3>Update Inquiry</h3><button class="modal-close" data-close="inquiryDialog">×</button></div><div class="modal-body"><div id="inquiryDetails"></div><form id="inquiryUpdateForm" class="form-grid" style="margin-top:16px"><input name="id" type="hidden"><div><label>Status</label><select name="status" class="control"></select></div><div><label>Follow-up Date</label><input name="followup_date" type="date" class="control"></div><div class="full"><label>Public Customer Update</label><textarea name="public_note" class="control"></textarea></div><div class="full"><label>Internal Admin Note</label><textarea name="internal_note" class="control"></textarea></div><div class="full"><button class="btn btn-blue btn-block">Save Inquiry Update</button></div></form><h4>Status History</h4><div id="inquiryHistory" class="timeline"></div></div></dialog>
<script src="./config.js"></script><script src="./admin.js"></script></body></html>
